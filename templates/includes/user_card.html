{% load i18n %}
<div class="pixel-card user-item" style="display: flex; justify-content: space-between; align-items: center; padding: 15px;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <div>
            {% if creator.avatar %}
                <img src="{{ creator.avatar.url }}" alt="{{ creator.username }}" style="width: 100px; height: 100px; object-fit: cover; border: 3px solid var(--pixel-black);">
            {% else %}
                <div style="width: 100px; height: 100px; background: #eee; border: 3px solid var(--pixel-black); display: flex; align-items: center; justify-content: center; color: #999; font-family: 'VT323', monospace; font-size: 0.8rem; text-align: center;">No Avatar</div>
            {% endif %}
        </div>
        <div>
            <h3 style="margin: 0; text-transform: uppercase;">{{ creator.username }}</h3>
            <p style="margin: 5px 0 0 0; color: #555;">{% trans "Service" %}: Shop</p>
        </div>
    </div>
    <a href="{% url 'public_shop' slug=creator.slug %}" class="btn-main"
        style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center; height: 35px; padding: 0 15px; font-family: 'VT323', monospace; width: auto; text-transform: uppercase; font-size: 1.1rem; border: 2px solid var(--pixel-black); margin: 0; color: black;">
        {% trans "Visit" %}
    </a>
</div>
