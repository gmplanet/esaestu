<!DOCTYPE html>
<html lang="{% if maintenance.message_es %}es{% else %}en{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESAESTU.CASA - MAINTENANCE</title>
    <style>
        /* Основные стили в твоем стиле */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace; /* Имитация ретро-стиля */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Шапка как на твоем скрине */
        header {
            border-bottom: 3px solid #000000;
            padding: 20px 40px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: #0044cc; /* Синий акцент из твоего логотипа */
        }

        /* Центральный блок */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .maintenance-container {
            border: 2px dashed #0044cc; /* Твоя синяя пунктирная рамка */
            padding: 60px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: clamp(24px, 5vw, 42px);
            text-transform: uppercase;
            margin-top: 0;
            font-weight: 900;
        }

        .message {
            font-size: 20px;
            margin-top: 20px;
            line-height: 1.5;
        }

        /* Желтая "кнопка" в твоем стиле */
        .status-badge {
            display: inline-block;
            background-color: #ffcc00; /* Твой фирменный желтый */
            color: #000000;
            padding: 10px 20px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 30px;
            border: 2px solid #000000;
        }

        footer {
            padding: 20px;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #000000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🏠 ESAESTU<span>.CASA</span></div>
    </header>

    <main>
        <div class="maintenance-container">
            <div class="status-badge">MANTENIMIENTO / MAINTENANCE</div>
            
            <h1>{{ maintenance.message }}</h1>
            
            <div class="message">
                Estamos trabajando para mejorar el servicio.<br>
                We are working to improve the service.
            </div>
        </div>
    </main>

    <footer>
        &copy; 2025 ESAESTU.CASA - SIN COMISIONES EXTRA.
    </footer>

</body>
</html>
