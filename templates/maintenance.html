<!DOCTYPE html>
<html lang="{% if maintenance.message_es %}es{% else %}en{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESAESTU.CASA - MAINTENANCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pixel-grey: #888888;
            --pixel-black: #1a1a1a;
            --pixel-white: #ffffff;
            --pixel-blue: #0055A4;   /* Azul Bilbao */
            --pixel-yellow: #FFD700; /* Amarillo Sol */
            --pixel-border: 3px;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'VT323', monospace;
            background-color: var(--pixel-white);
            color: var(--pixel-black);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER (Копия твоего стиля) */
        .header-main {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 15px 25px;
            background: var(--pixel-white);
            border-bottom: var(--pixel-border) solid var(--pixel-black);
        }

        .logo-pixel {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--pixel-black);
            text-transform: uppercase;
        }

        .logo-pixel span {
            color: var(--pixel-blue);
        }

        /* CONTENT */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hero-pixel {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 60px 40px;
            border: var(--pixel-border) dashed var(--pixel-blue); /* Твоя синяя рамка */
            background: var(--pixel-white);
        }

        .status-badge {
            font-family: 'Press Start 2P', cursive;
            display: inline-block;
            background: var(--pixel-yellow);
            color: var(--pixel-black);
            padding: 12px 20px;
            font-size: 0.8rem;
            border: var(--pixel-border) solid var(--pixel-black);
            box-shadow: 4px 4px 0px var(--pixel-grey);
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            line-height: 1.5;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .message-text {
            font-size: 1.8rem;
            line-height: 1.4;
            color: var(--pixel-black);
            margin-bottom: 20px;
        }

        /* FOOTER */
        .footer-main {
            border-top: var(--pixel-border) solid var(--pixel-black);
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Анимация мигания для ретро-эффекта */
        .blink {
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <header class="header-main">
        <div class="logo-pixel">ESAESTU<span>.CASA</span></div>
    </header>

    <div class="main-wrapper">
        <div class="hero-pixel">
            <div class="status-badge blink">SYSTEM PAUSED</div>
            
            <h1>Maintenance Mode</h1>
            
            <div class="message-text">
                {{ maintenance.message }}
            </div>

            <div style="font-size: 1.2rem; color: var(--pixel-grey); margin-top: 20px;">
                TRABAJANDO PARA MEJORAR EL SERVICIO...
            </div>
        </div>
    </div>

    <footer class="footer-main">
        &copy; 2025 ESAESTU.CASA
    </footer>

</body>
</html>
