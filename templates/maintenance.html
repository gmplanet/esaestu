<!DOCTYPE html>
<html lang="{% if maintenance.message_es %}es{% else %}en{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode | EsaEsTuCasa</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 16px 0;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .message {
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-dim);
            margin-bottom: 32px;
            white-space: pre-wrap; /* Чтобы сохранялись переносы строк из админки */
        }

        .footer {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 24px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Maintenance Mode</h1>
        
        <div class="message">
            {{ maintenance.message }}
        </div>

        <div class="footer">
            &copy; 2025 esaestu.casa We will be back shortly.
        </div>
    </div>
</body>
</html>
