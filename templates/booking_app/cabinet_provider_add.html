{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="content-center">
    <h1>{% trans "Add New Provider" %}</h1>cabinet_provider_add
    
    <div class="pixel-card border-grey">
        <p class="form-description">
            {% trans "Add staff members, specialists, or generic roles (e.g., 'Master 1') that customers can choose." %}
        </p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <div class="form-actions">
                <button type="submit" class="btn-main pixel-btn-action pixel-btn-grey">
                    {% trans "Save Provider" %}
                </button>
                
                <a href="{% url 'cabinet_booking_list' %}" class="pixel-link-cancel">
                    {% trans "Cancel" %}
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
