{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="content-center">
    <h1>{% trans "Add New Provider" %}</h1>
    
    <div class="pixel-card" style="border-color: var(--pixel-grey);">
        <p style="margin-top: 0; color: #555;">{% trans "Add staff members, specialists, or generic roles (e.g., 'Master 1') that customers can choose." %}</p>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div style="margin-top: 20px;">
                <button type="submit" class="btn-main" style="background: var(--pixel-grey);">{% trans "Save Provider" %}</button>
                <a href="{% url 'cabinet_booking_list' %}" style="margin-left: 15px; color: var(--pixel-red); text-decoration: none; font-family: 'VT323', monospace; font-size: 1.2rem;">
                    {% trans "Cancel" %}
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
