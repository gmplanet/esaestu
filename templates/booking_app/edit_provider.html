{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="content-center">
    <h1>{% trans "Edit Provider" %}</h1>
    <div class="pixel-card">
        <form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
            {% csrf_token %}
            {{ form.as_p }}
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button type="submit" class="btn-main" style="width: auto; padding: 5px 20px;">{% trans "Save Changes" %}</button>
                <a href="{% url 'cabinet_booking_list' %}" class="btn-main" style="width: auto; padding: 5px 20px; background: var(--pixel-grey); color: black; text-align: center; text-decoration: none;">{% trans "Cancel" %}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
