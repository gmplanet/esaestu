{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="content-center">
    <h1>{% trans "Delete Product" %}</h1>
    
    <div class="pixel-card border-red">
        <p class="delete-warning-text">
            {% trans "Are you sure you want to delete the product" %} 
            <strong class="status-inactive">"{{ product.title }}"</strong>?
        </p>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="delete-actions">
                <button type="submit" class="btn-main pixel-btn-action pixel-btn-red">
                    {% trans "Confirm Delete" %}
                </button>
                
                <a href="{% url 'cabinet_shop_list' %}" class="btn-main pixel-btn-action pixel-btn-grey">
                    {% trans "Cancel" %}
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
