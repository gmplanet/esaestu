{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="auth-container">
    <h2>{% trans "Registration" %}</h2>
    <form method="post">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="error">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn-main">{% trans "Register" %}</button>
    </form>
</div>


{% endblock %}
